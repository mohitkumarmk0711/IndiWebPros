<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinterest Clone</title>

    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ================= SIDEBAR ================= -->

    <aside class="sidebar">

        <img src="pinteresrt_icon.png" class="logo">

        <div class="icon-box">
            <a href="homepage.html" class="active">
                <span class="material-icons-outlined">home</span>
            </a>
            <span class="tooltip">Home</span>
        </div>

        <div class="icon-box">
            <a href="explore.html">
                <span class="material-icons-outlined">explore</span>
            </a>
            <span class="tooltip">Explore</span>
        </div>

        <div class="icon-box">
            <a href="saved.html">
                <span class="material-icons-outlined">dashboard</span>
            </a>
            <span class="tooltip">Saved</span>
        </div>

        <div class="icon-box">
            <a href="create.html">
                <span class="material-icons-outlined">add_box</span>
            </a>
            <span class="tooltip">Create</span>
        </div>

        <div class="icon-box">
            <a href="notifications.html">
                <span class="material-icons-outlined">notifications</span>
            </a>
            <span class="tooltip">Notifications</span>
        </div>

        <div class="icon-box">
            <a href="messages.html">
                <span class="material-icons-outlined">chat_bubble_outline</span>
            </a>
            <span class="tooltip">Messages</span>
        </div>

        <div class="bottom">

            <div class="icon-box">
                <a href="settings.html">
                    <span class="material-icons-outlined">settings</span>
                </a>
                <span class="tooltip">Settings</span>
            </div>

        </div>

    </aside>

    <!-- ================= TOP BAR ================= -->

    <header class="topbar">

        <div class="search-box">

            <span class="material-icons-outlined search-icon">search</span>

            <input
                type="text"
                placeholder="Search">

        </div>

        <div class="top-right">

            <span class="material-icons-outlined">photo_camera</span>

            <span class="material-icons-outlined">mic</span>

            <div class="profile">
                M
            </div>

        </div>

    </header>

    <!-- ================= PAGE CONTENT ================= -->

    <main class="content">
        
    <div class="profile">

        <img src="images/profile.jpeg" alt="profile">
        <h1>Pinterest User</h1>

        <p>@pinterestuser</p>
        
        <div class="buttons">
    <button class="share">Share</button>
    <button class="edit">Edit Profile</button>
</div>

    </div>
    <div class="tabs">
    <span>Saved</span>
    <span class="active">Boards</span>
</div>
<div class="create-board">
    <button>+ Create Board</button>
</div>
    <div class="boards">

    <div class="board">
        <img src="images/board1.jpeg" alt="drawing">
        <h3>drawing</h3>
        <p>18 Pins</p>
    </div>

    <div class="board">
        <img src="images/board2.jpeg" alt="puppy">
        <h3>puppy</h3>
        <p>24 Pins</p>
    </div>

    <div class="board">
        <img src="images/board3.jpeg" alt="beach night">
        <h3>beach night</h3>
        <p>12 Pins</p>
    </div>

    <div class="board">
        <img src="images/board4.jpeg" alt="Photography">
        <h3>Photography</h3>
        <p>30 Pins</p>
    </div>

</div>
    </main>

</body>
</html>
