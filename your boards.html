<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Boards</title>

    <link rel="stylesheet" href="your boards.css">

</head>
<body>
     <div class="container">

    <div class="profile">

        <img src="images/profile.jpeg" alt="profile">
        <h1>Pinterest User</h1>

        <p>@pinterestuser</p>
        
        <div class="buttons">
    <button class="share">Share</button>
    <button class="edit">Edit Profile</button>
</div>

    </div>
    <div class="tabs">
    <span>Saved</span>
    <span class="active">Boards</span>
</div>
<div class="create-board">
    <button>+ Create Board</button>
</div>
    <div class="boards">

    <div class="board">
        <img src="images/board1.jpeg" alt="drawing">
        <h3>drawing</h3>
        <p>18 Pins</p>
    </div>

    <div class="board">
        <img src="images/board2.jpeg" alt="puppy">
        <h3>puppy</h3>
        <p>24 Pins</p>
    </div>

    <div class="board">
        <img src="images/board3.jpeg" alt="beach night">
        <h3>beach night</h3>
        <p>12 Pins</p>
    </div>

    <div class="board">
        <img src="images/board4.jpeg" alt="Photography">
        <h3>Photography</h3>
        <p>30 Pins</p>
    </div>

</div>
</div>
</body>
</html>
