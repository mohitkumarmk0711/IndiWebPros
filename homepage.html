<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinterest Home Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <header>
        <div class="logo">Pinterest</div>

        <nav>
            <a href="#">Home</a>
            <a href="#">Explore</a>
            <a href="#">Create</a>
        </nav>

        <div class="search-box">
            <input type="text" placeholder="Search">
        </div>

        <div class="profile">
            👤
        </div>
    </header>

    <!-- Image Gallery -->

    <main class="gallery">

        <div class="card">
            <img src="https://picsum.photos/300/450?random=1">
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/350?2">
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/500?random=3">
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/400?4">
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/600?random=5">
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/370?6">
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/450?random=7">
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/500?random=8">
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/350?random=9">
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/550?random=10">
        </div>

    </main>

</body>
</html>
