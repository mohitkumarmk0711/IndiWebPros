<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinterest Explorer</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
</head>
<body>
    <aside class="sidebar">
        <img src="pinteresrt_icon.png" class="logo" alt="Pinterest logo">

        <div class="icon-box">
            <a href="index.html" class="active">
                <span class="material-icons-outlined">home</span>
            </a>
            <span class="tooltip">Home</span>
        </div>

        <div class="icon-box">
            <a href="explore.html">
                <span class="material-icons-outlined">explore</span>
            </a>
            <span class="tooltip">Explore</span>
        </div>

        <div class="icon-box">
            <a href="saved.html">
                <span class="material-icons-outlined">dashboard</span>
            </a>
            <span class="tooltip">Saved</span>
        </div>

        <div class="icon-box">
            <a href="create.html">
                <span class="material-icons-outlined">add_box</span>
            </a>
            <span class="tooltip">Create</span>
        </div>

        <div class="icon-box">
            <a href="notifications.html">
                <span class="material-icons-outlined">notifications</span>
            </a>
            <span class="tooltip">Notifications</span>
        </div>

        <div class="icon-box">
            <a href="messages.html">
                <span class="material-icons-outlined">chat_bubble_outline</span>
            </a>
            <span class="tooltip">Messages</span>
        </div>

        <div class="bottom">
            <div class="icon-box">
                <a href="settings.html">
                    <span class="material-icons-outlined">settings</span>
                </a>
                <span class="tooltip">Settings</span>
            </div>
        </div>
    </aside>

    <div class="page">
        <header class="topbar">
            <div class="search-box">
                <span class="material-icons-outlined search-icon">search</span>
                <input type="text" placeholder="Search ideas">
                <div class="top-icons">
                    <span class="material-icons-outlined">photo_camera</span>
                    <span class="material-icons-outlined">mic</span>
                </div>
            </div>
            <div class="profile">M</div>
        </header>

        <main class="content">
            <section class="heading">
                <h1>Explore</h1>
                <p>Discover new ideas and inspiration</p>
            </section>

            <section class="gallery">
                <div class="card">
                    <img src="images/img1.png" alt="Inspiration pin 1">
                    <div class="overlay">
                        <button>Save</button>
                        <a href="images/img1.png" download class="download-btn"><i class="fa-solid fa-download"></i></a>
                    </div>
                </div>

                <div class="card">
                    <img src="images/img2.png" alt="Inspiration pin 2">
                    <div class="overlay">
                        <button>Save</button>
                        <a href="images/img2.png" download class="download-btn"><i class="fa-solid fa-download"></i></a>
                    </div>
                </div>

                <div class="card tall">
                    <img src="images/img3.png" alt="Inspiration pin 3">
                    <div class="overlay">
                        <button>Save</button>
                        <a href="images/img3.png" download class="download-btn"><i class="fa-solid fa-download"></i></a>
                    </div>
                </div>

                <div class="card">
                    <img src="images/img4.png" alt="Inspiration pin 4">
                    <div class="overlay">
                        <button>Save</button>
                        <a href="images/img4.png" download class="download-btn"><i class="fa-solid fa-download"></i></a>
                    </div>
                </div>

                <div class="card">
                    <img src="images/img5.png" alt="Inspiration pin 5">
                    <div class="overlay">
                        <button>Save</button>
                        <a href="images/img5.png" download class="download-btn"><i class="fa-solid fa-download"></i></a>
                    </div>
                </div>

                <div class="card tall">
                    <img src="images/img6.png" alt="Inspiration pin 6">
                    <div class="overlay">
                        <button>Save</button>
                        <a href="images/img6.png" download class="download-btn"><i class="fa-solid fa-download"></i></a>
                    </div>
                </div>

                <div class="card">
                    <img src="images/img7.png" alt="Inspiration pin 7">
                    <div class="overlay">
                        <button>Save</button>
                        <a href="images/img7.png" download class="download-btn"><i class="fa-solid fa-download"></i></a>
                    </div>
                </div>

                <div class="card">
                    <img src="images/img8.png" alt="Inspiration pin 8">
                    <div class="overlay">
                        <button>Save</button>
                        <a href="images/img8.png" download class="download-btn"><i class="fa-solid fa-download"></i></a>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
</html>
