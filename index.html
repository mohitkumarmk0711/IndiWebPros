<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinterest Login</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
</head>
<body>

    <div class="login-page">

        <div class="login-container">

            <!-- Close Button -->
            <a href="homepage.html" class="close-btn">&times;</a>

            <!-- Logo -->
            <img src="pinteresrt_icon.png" alt="Pinterest Logo" class="login-logo">

            <!-- Heading -->
            <h1>Welcome to Pinterest</h1>

            <p class="subtitle">
                Log in to discover more ideas just for you
            </p>

            <!-- Login Form -->
            <form action="homepage.html">

                <label>Email</label>

                <input
                    type="email"
                    placeholder="Email"
                    required>

                <label>Password</label>

                <div class="password-box">

                    <input
                        type="password"
                        placeholder="Password"
                        required>

                    <span class="material-icons-outlined">
                        visibility
                    </span>

                </div>

                <a href="#" class="forgot">
                    Forgot password?
                </a>

                <button type="submit" class="login-btn">
                    Log in
                </button>

            </form>

            <p class="or">
                OR
            </p>

            <!-- Google Button -->

            <button class="google-btn">

                <img src="googleimage.png" alt="Google">

                Continue with Google

            </button>

            <!-- QR Section -->

            <div class="qr-box">

                <h3>Log in instantly</h3>

                <p>
                    Scan this QR code with your phone to log in on the app.
                </p>

                <div class="qr-circle"></div>

            </div>

            <!-- Signup -->

            <p class="signup">

                New to Pinterest?

                <a href="#">
                    Join for free
                </a>

            </p>

            <!-- Footer -->

            <div class="footer-links">

                <a href="#">Terms of Service</a>

                &nbsp;·&nbsp;

                <a href="#">Privacy Policy</a>

                &nbsp;·&nbsp;

                <a href="#">Notice at Collection</a>

            </div>

        </div>

    </div>

</body>
</html>
